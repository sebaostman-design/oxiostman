<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — страница не найдена · Оксана Остман</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --sage: #8A9E8C;
    --sage-dark: #6B7E6D;
    --dusty-rose: #C49A8A;
    --text-dark: #2C2925;
    --text-mid: #5A5249;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    font-weight: 300;
  }
  .wrap { max-width: 520px; text-align: center; }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(120px, 20vw, 200px);
    font-weight: 300;
    font-style: italic;
    color: var(--dusty-rose);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .label { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--sage-dark); margin: 20px 0 16px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 40px); font-weight: 300; line-height: 1.2; margin-bottom: 16px; }
  p { color: var(--text-mid); font-size: 15px; line-height: 1.8; margin-bottom: 32px; max-width: 420px; margin-left: auto; margin-right: auto; }
  .btn {
    display: inline-block;
    background: var(--text-dark);
    color: #fff;
    text-decoration: none;
    padding: 16px 36px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: background .25s;
  }
  .btn:hover { background: var(--sage-dark); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <div class="label">Страница не найдена</div>
    <h1>Кажется, вы свернули не туда</h1>
    <p>Такой страницы не существует или она была перемещена. Вернитесь на главную — я буду рада вас видеть.</p>
    <a href="/" class="btn">На главную</a>
  </div>
</body>
</html>
